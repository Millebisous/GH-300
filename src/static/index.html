<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div class="section-divider"></div>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <div class="section-divider"></div>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>

      <section id="fortune-container">
        <h3>Daily Fortune (Omikuji)</h3>
        <div class="section-divider fortune-divider"></div>
        <div class="fortune-content">
          <p class="fortune-intro">Tap below to reveal your fortune for today.</p>
          <button id="fortune-button" type="button">Reveal Fortune</button>
          <div id="fortune-result" class="fortune-result hidden">Your fortune will appear here.</div>
        </div>
        <div class="section-divider fuel-divider"></div>
      </section>

      <section id="fuel-container">
        <h3>Fuel Checker</h3>
        <div class="section-divider fuel-divider"></div>
        <div id="fuel-buttons" class="fuel-buttons" aria-label="Fuel selector"></div>
        <div id="fuel-trends" class="fuel-trends">
          <p>Loading fuel trends...</p>
        </div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
